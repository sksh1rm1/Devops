apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-api
  template:
    metadata:
      labels:
        app: product-api
    spec:
      containers:
      - name: product-api
        image: ghcr.io/sksh1rm1/product-api:latest
        ports:
        - containerPort: 5000
        imagePullPolicy: Always